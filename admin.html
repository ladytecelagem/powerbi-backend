<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin - LADY BI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f5;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:white;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 12px 48px rgba(0,0,0,.10)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-icon{width:36px;height:36px;border-radius:9px;background:#1d1d1f;display:flex;align-items:center;justify-content:center}
.login-icon svg{width:18px;height:18px;fill:white}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#6e6e73;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1px solid rgba(0,0,0,.12);border-radius:10px;font-size:15px;outline:none}
.form-group input:focus{border-color:#1d1d1f;box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.btn{padding:11px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-dark{background:#1d1d1f;color:white;width:100%;margin-top:4px}
.btn-approve{background:#e6f9ee;color:#006600;border:1px solid #99e6aa;font-size:13px;padding:6px 12px;border-radius:8px}
.btn-reject{background:#fff2f2;color:#cc0000;border:1px solid #ffcccc;font-size:13px;padding:6px 12px;border-radius:8px}
.btn-approve:hover,.btn-reject:hover{opacity:.8}
.btn-delete{background:#fff2f2;color:#cc0000;border:1px solid #ffcccc;font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer}
.btn-delete:hover{background:#ffdddd}
.error-msg{margin-top:12px;padding:10px 14px;background:#fff2f2;color:#cc0000;border-radius:8px;font-size:13px;display:none}
#admin-screen{display:none}
.topbar{background:white;border-bottom:1px solid rgba(0,0,0,.08);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-icon{width:28px;height:28px;border-radius:7px;background:#1d1d1f;display:flex;align-items:center;justify-content:center}
.topbar-icon svg{width:14px;height:14px;fill:white}
.topbar-title{font-size:15px;font-weight:700}
.btn-out{padding:6px 14px;background:transparent;border:1px solid rgba(0,0,0,.12);border-radius:8px;font-size:13px;cursor:pointer}
.content{max-width:960px;margin:0 auto;padding:28px 20px}
.admin-tabs{display:flex;margin-bottom:24px;border-radius:10px;background:#e8e8ed;padding:3px;width:fit-content}
.admin-tab{padding:8px 20px;font-size:14px;font-weight:500;cursor:pointer;border-radius:8px;color:#6e6e73;border:none;background:transparent;transition:all .2s}
.admin-tab.active{background:white;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,.10)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:white;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-num{font-size:32px;font-weight:700;line-height:1;margin-bottom:4px}
.stat-label{font-size:13px;color:#6e6e73}
.sp .stat-num{color:#cc7700}
.sa .stat-num{color:#006600}
.sr .stat-num{color:#cc0000}
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.fbtn{padding:7px 16px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(0,0,0,.12);background:white;color:#6e6e73;transition:all .15s}
.fbtn.active{background:#1d1d1f;color:white;border-color:#1d1d1f}
.sec-title{font-size:17px;font-weight:700;margin-bottom:14px}
.ulist{display:flex;flex-direction:column;gap:10px}
.ucard{background:white;border-radius:14px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;align-items:center;gap:14px}
.uav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.avp{background:#fff3d6;color:#cc7700}
.ava{background:#e6f9ee;color:#006600}
.avr{background:#fff2f2;color:#cc0000}
.uinfo{flex:1;min-width:0}
.un{font-size:15px;font-weight:600}
.ue{font-size:13px;color:#6e6e73}
.uco{font-size:12px;color:#aaa;margin-top:1px}
.ud{font-size:11px;color:#bbb;margin-top:3px}
.uact{display:flex;gap:8px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.bok{background:#e6f9ee;color:#006600}
.bno{background:#fff2f2;color:#cc0000}
.hwrap{overflow-x:auto}
.htable{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.htable th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:#6e6e73;text-transform:uppercase;letter-spacing:.04em;background:#f5f5f7;border-bottom:1px solid rgba(0,0,0,.06)}
.htable td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(0,0,0,.04);vertical-align:top}
.htable tr:last-child td{border-bottom:none}
.htable tr:hover td{background:#fafafa}
.pwrap{display:flex;flex-wrap:wrap;gap:4px;max-width:180px}
.ptag{background:#f0f0f5;border-radius:4px;padding:2px 6px;font-family:monospace;font-size:11px;font-weight:600}
.sok{color:#006600;font-weight:600}
.ssim{color:#cc7700}
.serr{color:#cc0000;font-size:11px}
.empty{text-align:center;padding:40px;color:#aaa;font-size:15px}
.ltxt{text-align:center;padding:40px;color:#aaa}
.htopbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1d1d1f;color:white;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon"><svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg></div>
      <div><div style="font-size:15px;font-weight:700">LADY BI</div><div style="font-size:12px;color:#6e6e73">Painel Administrativo</div></div>
    </div>
    <div class="login-title">Acesso restrito</div>
    <div class="login-sub">Entre com a senha de administrador</div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="admin-pw" placeholder="Sua senha admin"/>
    </div>
    <button class="btn btn-dark" id="btn-entrar">Entrar</button>
    <div class="error-msg" id="login-err">Senha incorreta.</div>
  </div>
</div>
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm0 11h7v7h-7v-7z"/></svg></div>
      <div class="topbar-title">Painel Admin - LADY BI</div>
    </div>
    <button class="btn-out" id="btn-out">Sair</button>
  </div>
  <div class="content">
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-u">Usuarios</button>
      <button class="admin-tab" id="tab-h">Historico de Envios</button>
    </div>
    <div id="panel-u">
      <div class="stats">
        <div class="stat-card sp"><div class="stat-num" id="cp">0</div><div class="stat-label">Pendentes</div></div>
        <div class="stat-card sa"><div class="stat-num" id="ca">0</div><div class="stat-label">Aprovados</div></div>
        <div class="stat-card sr"><div class="stat-num" id="cr">0</div><div class="stat-label">Rejeitados</div></div>
      </div>
      <div class="filter-bar">
        <button class="fbtn active" data-f="all">Todos</button>
        <button class="fbtn" data-f="pending">Pendentes</button>
        <button class="fbtn" data-f="approved">Aprovados</button>
        <button class="fbtn" data-f="rejected">Rejeitados</button>
      </div>
      <div class="sec-title" id="ltitle">Todos os usuarios</div>
      <div class="ulist" id="ulist"><div class="ltxt">Carregando...</div></div>
    </div>
    <div id="panel-h" style="display:none">
      <div class="htopbar">
        <div class="sec-title" style="margin:0">Historico de Envios</div>
        <button class="fbtn" id="btn-refresh-h">Atualizar</button>
      </div>
      <div class="hwrap"><div id="hcont"><div class="ltxt">Carregando...</div></div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var API = "https://powerbi-backend-production.up.railway.app";
var tok = sessionStorage.getItem("admin_token");
var allUsers = [];
var curF = "all";

// Eventos - sem onclick inline para evitar problemas de aspas
document.getElementById("btn-entrar").addEventListener("click", doLogin);
document.getElementById("admin-pw").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });
document.getElementById("btn-out").addEventListener("click", doLogout);
document.getElementById("tab-u").addEventListener("click", function(){ showTab("u"); });
document.getElementById("tab-h").addEventListener("click", function(){ showTab("h"); });
document.getElementById("btn-refresh-h").addEventListener("click", loadHist);
document.querySelectorAll(".fbtn[data-f]").forEach(function(btn){
  btn.addEventListener("click", function(){
    document.querySelectorAll(".fbtn[data-f]").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    curF = btn.getAttribute("data-f");
    var titles = {all:"Todos os usuarios",pending:"Pendentes",approved:"Aprovados",rejected:"Rejeitados"};
    document.getElementById("ltitle").textContent = titles[curF];
    renderUsers();
  });
});

if(tok) init();

function doLogin(){
  var pw = document.getElementById("admin-pw").value;
  if(!pw) return;
  var btn = document.getElementById("btn-entrar");
  btn.textContent = "Entrando..."; btn.disabled = true;
  fetch(API+"/admin/login", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:pw})})
  .then(function(r){ return r.json().then(function(d){ return {s:r.status,d:d}; }); })
  .then(function(res){
    btn.textContent = "Entrar"; btn.disabled = false;
    if(res.s !== 200){ document.getElementById("login-err").style.display = "block"; return; }
    tok = res.d.token;
    sessionStorage.setItem("admin_token", tok);
    document.getElementById("login-err").style.display = "none";
    init();
  })
  .catch(function(){ btn.textContent="Entrar"; btn.disabled=false; document.getElementById("login-err").style.display="block"; });
}

function doLogout(){
  sessionStorage.removeItem("admin_token"); tok = null;
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

function init(){
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "block";
  loadUsers();
}

function showTab(t){
  document.getElementById("panel-u").style.display = (t==="u") ? "" : "none";
  document.getElementById("panel-h").style.display = (t==="h") ? "" : "none";
  document.getElementById("tab-u").classList.toggle("active", t==="u");
  document.getElementById("tab-h").classList.toggle("active", t==="h");
  if(t==="h") loadHist();
}

function loadUsers(){
  fetch(API+"/admin/users", {headers:{"x-session-token":tok}})
  .then(function(r){ if(r.status===403){doLogout();return null;} return r.json(); })
  .then(function(data){
    if(!data) return;
    allUsers = data;
    document.getElementById("cp").textContent = data.filter(function(u){return u.status==="pending";}).length;
    document.getElementById("ca").textContent = data.filter(function(u){return u.status==="approved";}).length;
    document.getElementById("cr").textContent = data.filter(function(u){return u.status==="rejected";}).length;
    renderUsers();
  })
  .catch(function(){ document.getElementById("ulist").innerHTML = "<div class='empty'>Erro ao carregar</div>"; });
}

function renderUsers(){
  var list = curF==="all" ? allUsers : allUsers.filter(function(u){ return u.status===curF; });
  list = list.slice().sort(function(a,b){
    var o = {pending:0,approved:1,rejected:2};
    return (o[a.status]||0)-(o[b.status]||0) || new Date(b.createdAt)-new Date(a.createdAt);
  });
  var el = document.getElementById("ulist");
  if(!list.length){ el.innerHTML = "<div class='empty'>Nenhum usuario</div>"; return; }
  // Cria cards sem strings de onclick complexas
  el.innerHTML = "";
  list.forEach(function(u){
    var card = document.createElement("div");
    card.className = "ucard";
    var ini = (u.name||u.email).charAt(0).toUpperCase();
    var avCls = {pending:"avp",approved:"ava",rejected:"avr"}[u.status]||"avp";
    var dt = new Date(u.createdAt).toLocaleString("pt-BR");
    var infoHtml = "<div class='un'>"+u.name+"</div><div class='ue'>"+u.email+"</div>"
      +(u.company?"<div class='uco'>"+u.company+"</div>":"")+"<div class='ud'>Cadastrado em "+dt+"</div>";
    card.innerHTML = "<div class='uav "+avCls+"'>"+ ini +"</div><div class='uinfo'>"+infoHtml+"</div><div class='uact' id='act-"+encodeURIComponent(u.email)+"'></div>";
    el.appendChild(card);
    var actDiv = card.querySelector(".uact");
    if(u.status==="pending"){
      var bA = makeBtn("btn-approve","Aprovar",u.email,"ap");
      var bR = makeBtn("btn-reject","Rejeitar",u.email,"rj");
      actDiv.appendChild(bA); actDiv.appendChild(bR);
    } else if(u.status==="approved"){
      actDiv.innerHTML = "<span class='badge bok'>Aprovado</span>";
      actDiv.appendChild(makeBtn("btn-reject","Revogar",u.email,"rj"));
    } else {
      actDiv.innerHTML = "<span class='badge bno'>Rejeitado</span>";
      actDiv.appendChild(makeBtn("btn-approve","Aprovar",u.email,"ap"));
    }
    // Botao deletar sempre visivel
    var bDel = document.createElement("button");
    bDel.className = "btn-delete"; bDel.textContent = "Deletar";
    bDel.addEventListener("click", function(){
      if(confirm("Tem certeza que deseja deletar o usuario " + u.name + "?")) doDelete(u.email);
    });
    actDiv.appendChild(bDel);
  });
}

function makeBtn(cls, label, email, action){
  var b = document.createElement("button");
  b.className = cls; b.textContent = label;
  b.addEventListener("click", function(){
    if(action==="ap") doApprove(email);
    else doReject(email);
  });
  return b;
}

function doApprove(email){
  fetch(API+"/admin/approve/"+encodeURIComponent(email), {method:"POST",headers:{"x-session-token":tok}})
  .then(function(r){ if(r.ok){ toast("Aprovado!"); loadUsers(); } });
}
function doReject(email){
  fetch(API+"/admin/reject/"+encodeURIComponent(email), {method:"POST",headers:{"x-session-token":tok}})
  .then(function(r){ if(r.ok){ toast("Rejeitado!"); loadUsers(); } });
}
function doDelete(email){
  fetch(API+"/admin/users/"+encodeURIComponent(email), {method:"DELETE",headers:{"x-session-token":tok}})
  .then(function(r){ if(r.ok){ toast("Usuario deletado!"); loadUsers(); } else { toast("Erro ao deletar!"); } });
}

function loadHist(){
  var el = document.getElementById("hcont");
  el.innerHTML = "<div class='ltxt'>Carregando...</div>";
  fetch(API+"/admin/email-history", {headers:{"x-session-token":tok}})
  .then(function(r){ if(r.status===403){doLogout();return null;} return r.json(); })
  .then(function(data){
    if(!data) return;
    if(!data.length){ el.innerHTML="<div class='empty'>Nenhum envio registrado</div>"; return; }
    var h = "<table class='htable'><thead><tr>"
      +"<th>Data/Hora</th><th>Solicitante</th><th>Cliente</th><th>Previsao</th><th>Pecas</th><th>Observacoes</th><th>Status</th>"
      +"</tr></thead><tbody>";
    data.forEach(function(r){
      var pt = (r.pecas||[]).map(function(p){ return "<span class='ptag'>"+p+"</span>"; }).join("");
      var sc = r.status==="enviado" ? "sok" : (r.status==="simulado" ? "ssim" : "serr");
      var sl = r.status==="enviado" ? "Enviado" : (r.status==="simulado" ? "Simulado" : "Erro");
      h += "<tr>"
        +"<td style='white-space:nowrap;color:#888;font-size:12px'>"+(r.dataHora||"")+"</td>"
        +"<td><b>"+(r.solicitante||"")+"</b><div style='color:#aaa;font-size:11px'>"+(r.email||"")+"</div></td>"
        +"<td>"+(r.cliente||"—")+"</td>"
        +"<td style='font-size:12px'>"+(r.previsao||"—")+"</td>"
        +"<td><div class='pwrap'>"+pt+"</div></td>"
        +"<td style='font-size:12px;max-width:140px'>"+(r.obs||"—")+"</td>"
        +"<td class='"+sc+"'>"+ sl +"</td></tr>";
    });
    h += "</tbody></table>";
    el.innerHTML = h;
  })
  .catch(function(){ el.innerHTML="<div class='empty'>Erro ao carregar</div>"; });
}

function toast(msg){
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}
</script>
</body>
</html>
