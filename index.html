<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Comercial - LADY BI</title>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f7; min-height: 100vh; }
    .page-header { background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 50; padding: 0 24px; }
    .header-inner { max-width: 1280px; margin: 0 auto; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 17px; font-weight: 600; }
    .status-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 100px; background: white; border: 1px solid rgba(0,0,0,0.08); font-size: 12px; font-weight: 500; color: #6e6e73; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #8e8e93; transition: background 0.3s; }
    .status-pill.live .status-dot { background: #30d158; animation: pulse 2s infinite; }
    .status-pill.live { color: #1d1d1f; }
    .status-pill.error .status-dot { background: #ff3b30; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(48,209,88,0.25)} 50%{box-shadow:0 0 0 6px rgba(48,209,88,0.10)} }
    .page { padding: 24px 20px 40px; min-height: calc(100vh - 56px); display: flex; flex-direction: column; }
    .card { max-width: 1280px; width: 100%; height:100%; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 12px 48px rgba(0,0,0,0.10); overflow: hidden; flex: 1; display: flex; flex-direction: column; }
    .card-header { padding: 20px 24px; border-bottom: 1px solid rgba(0,0,0,0.08); }
    .report-title { font-size: 15px; font-weight: 600; }
    .report-area { flex: 1; position: relative; min-height: 600px; }
    #report-container { width: 100%; min-height: 600px; }
    #report-container iframe { border: none !important; }
    .overlay { position: absolute; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 10; transition: opacity 0.4s; }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .overlay-error { display: none; }
    .overlay-error.visible { display: flex; }
    .spinner { width: 36px; height: 36px; border-radius: 50%; border: 2.5px solid rgba(0,113,227,0.15); border-top-color: #0071e3; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #6e6e73; }
    .error-title { font-size: 18px; font-weight: 600; }
    .error-msg { font-size: 13px; color: #6e6e73; max-width: 400px; text-align: center; word-break: break-all; }
    .retry-btn { padding: 10px 24px; background: #0071e3; color: white; border: none; border-radius: 980px; font-size: 15px; cursor: pointer; }
    .retry-btn:hover { background: #0058b2; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div class="header-title">Dashboard Comercial — LADY BI</div>
      <div class="status-pill" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-text">Inicializando</span>
      </div>
    </div>
  </header>
  <main class="page">
    <div class="card">
      <div class="card-header">
        <div class="report-title">Relatorio Comercial</div>
      </div>
      <div class="report-area">
        <div class="overlay" id="loading-overlay">
          <div class="spinner"></div>
          <div class="loading-text" id="loading-text">Conectando ao Power BI...</div>
        </div>
        <div class="overlay overlay-error" id="error-overlay">
          <div style="font-size:40px">⚠️</div>
          <div class="error-title">Falha na conexao</div>
          <div class="error-msg" id="error-msg"></div>
          <button class="retry-btn" onclick="init()">Tentar novamente</button>
        </div>
        <div id="report-container"></div>
      </div>
    </div>
  </main>
  <script>
    var BACKEND_URL = 'https://powerbi-backend-production.up.railway.app/getEmbedToken';
    function setStatus(cls, text) {
      document.getElementById('status-pill').className = 'status-pill ' + cls;
      document.getElementById('status-text').textContent = text;
    }
    function showError(msg) {
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('error-overlay').classList.add('visible');
      document.getElementById('error-msg').textContent = msg;
      setStatus('error', 'Erro');
    }
    async function init() {
      document.getElementById('loading-overlay').classList.remove('hidden');
      document.getElementById('error-overlay').classList.remove('visible');
      document.getElementById('loading-text').textContent = 'Conectando ao Power BI...';
      setStatus('', 'Carregando...');
      try {
        var res = await fetch(BACKEND_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        if (data.error) throw new Error(data.error);
        var models = window['powerbi-client'] && window['powerbi-client'].models;
        if (!models) throw new Error('powerbi-client nao carregado');
        var pbi = new window['powerbi-client'].service.Service(
          window['powerbi-client'].factories.hpmFactory,
          window['powerbi-client'].factories.wpmpFactory,
          window['powerbi-client'].factories.routerFactory
        );
        var container = document.getElementById('report-container');
        pbi.reset(container);
        var report = pbi.embed(container, {
          type: 'report',
          tokenType: models.TokenType.Embed,
          accessToken: data.accessToken,
          embedUrl: data.embedUrl,
          id: data.reportId,
          settings: { navContentPaneEnabled: true, filterPaneEnabled: true }
        });
        report.on('loaded', function() {
          document.getElementById('loading-overlay').classList.add('hidden');
          setStatus('live', 'Ativo');
        });
        report.on('error', function(e) {
          showError('Erro: ' + (e.detail && e.detail.message || JSON.stringify(e.detail)));
        });
      } catch(e) { showError(e.message); }
    }
    init();
  </script>
</body>
</html>
