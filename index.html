<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Comercial - LADY BI</title>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; }

    /* Header fixo */
    .page-header {
      height: 52px; flex-shrink: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex; align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg,#0071e3,#5e5ce6); display:flex; align-items:center; justify-content:center; }
    .logo svg { width:16px; height:16px; fill:white; }
    .header-title { font-size: 15px; font-weight: 600; color: #1d1d1f; }
    .status-pill { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; background: white; border: 1px solid rgba(0,0,0,0.08); font-size: 11px; font-weight: 500; color: #6e6e73; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #8e8e93; transition: background 0.3s; }
    .status-pill.live .status-dot { background: #30d158; box-shadow: 0 0 0 3px rgba(48,209,88,0.25); animation: pulse 2s infinite; }
    .status-pill.live { color: #1d1d1f; }
    .status-pill.error .status-dot { background: #ff3b30; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(48,209,88,.25)}50%{box-shadow:0 0 0 6px rgba(48,209,88,.10)} }

    /* Area principal — ocupa todo o resto da altura */
    .main-area {
      flex: 1;
      overflow: hidden;
      padding: 12px 16px 12px;
      display: flex;
      flex-direction: column;
    }

    /* Card que contém o relatório */
    .report-card {
      flex: 1;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Container do relatório — preenche todo o card */
    #report-container {
      flex: 1;
      width: 100%;
      min-height: 0; /* essencial para flex funcionar */
    }
    #report-container iframe {
      border: none !important;
      width: 100% !important;
      height: 100% !important;
    }

    /* Overlay de loading */
    .overlay {
      position: absolute; inset: 0;
      background: white;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 10;
      transition: opacity 0.3s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 32px; height: 32px; border-radius: 50%; border: 2.5px solid rgba(0,113,227,0.15); border-top-color: #0071e3; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #6e6e73; }

    /* Overlay de erro */
    .error-overlay { display: none; position: absolute; inset: 0; background: white; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10; padding: 32px; }
    .error-overlay.visible { display: flex; }
    .error-title { font-size: 17px; font-weight: 600; }
    .error-msg { font-size: 13px; color: #6e6e73; max-width: 380px; text-align: center; word-break: break-all; }
    .retry-btn { padding: 9px 22px; background: #0071e3; color: white; border: none; border-radius: 980px; font-size: 14px; cursor: pointer; margin-top: 4px; }
    .retry-btn:hover { background: #0058b2; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm0 11h7v7h-7v-7z"/></svg>
      </div>
      <span class="header-title">Dashboard Comercial — LADY BI</span>
    </div>
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-text">Inicializando</span>
    </div>
  </header>

  <main class="main-area">
    <div class="report-card">
      <!-- Loading -->
      <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Conectando ao Power BI...</div>
      </div>
      <!-- Erro -->
      <div class="error-overlay" id="error-overlay">
        <div style="font-size:36px">⚠️</div>
        <div class="error-title">Falha na conexao</div>
        <div class="error-msg" id="error-msg"></div>
        <button class="retry-btn" onclick="init()">Tentar novamente</button>
      </div>
      <!-- Relatorio -->
      <div id="report-container"></div>
    </div>
  </main>

  <script>
    var BACKEND_URL = 'https://powerbi-backend-production.up.railway.app/getEmbedToken';

    function setStatus(cls, text) {
      document.getElementById('status-pill').className = 'status-pill ' + cls;
      document.getElementById('status-text').textContent = text;
    }
    function showError(msg) {
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('error-overlay').classList.add('visible');
      document.getElementById('error-msg').textContent = msg;
      setStatus('error', 'Erro');
    }

    async function init() {
      document.getElementById('loading-overlay').classList.remove('hidden');
      document.getElementById('error-overlay').classList.remove('visible');
      document.getElementById('loading-text').textContent = 'Conectando ao Power BI...';
      setStatus('', 'Carregando...');
      try {
        var res = await fetch(BACKEND_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        if (data.error) throw new Error(data.error);

        var models = window['powerbi-client'] && window['powerbi-client'].models;
        if (!models) throw new Error('powerbi-client nao carregado');

        var pbi = new window['powerbi-client'].service.Service(
          window['powerbi-client'].factories.hpmFactory,
          window['powerbi-client'].factories.wpmpFactory,
          window['powerbi-client'].factories.routerFactory
        );

        var container = document.getElementById('report-container');
        pbi.reset(container);

        var report = pbi.embed(container, {
          type: 'report',
          tokenType: models.TokenType.Embed,
          accessToken: data.accessToken,
          embedUrl: data.embedUrl,
          id: data.reportId,
          settings: {
            navContentPaneEnabled: true,
            filterPaneEnabled: true,
            background: models.BackgroundType.Transparent
          }
        });

        report.on('loaded', function() {
          document.getElementById('loading-overlay').classList.add('hidden');
          setStatus('live', 'Ativo');
        });
        report.on('error', function(e) {
          showError('Erro: ' + (e.detail && e.detail.message || JSON.stringify(e.detail)));
        });
      } catch(e) {
        showError(e.message);
      }
    }

    init();
  </script>
</body>
</html>
