<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Redefinir Senha - LADY BI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 12px 48px rgba(0,0,0,.10)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:36px;height:36px;border-radius:9px;background:#1d1d1f;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px;fill:white}
.logo-text{font-size:17px;font-weight:700;color:#1d1d1f}
.logo-sub{font-size:12px;color:#6e6e73}
.title{font-size:22px;font-weight:700;color:#1d1d1f;margin-bottom:6px}
.subtitle{font-size:14px;color:#6e6e73;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#1d1d1f;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1px solid rgba(0,0,0,.12);border-radius:10px;font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#1d1d1f;box-shadow:0 0 0 3px rgba(0,0,0,.08)}
.btn{width:100%;padding:12px;background:#1d1d1f;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;display:none}
.msg.error{background:#fff2f2;color:#cc0000;border:1px solid #ffcccc;display:block}
.msg.success{background:#f0fff4;color:#006600;border:1px solid #99e6aa;display:block}
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:#6e6e73;text-decoration:none}
.back-link:hover{color:#1d1d1f}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm0 11h7v7h-7v-7z"/></svg></div>
    <div><div class="logo-text">LADY BI</div><div class="logo-sub">Dashboard Comercial</div></div>
  </div>
  <div id="form-area">
    <div class="title">Redefinir senha</div>
    <div class="subtitle">Crie uma nova senha para sua conta</div>
    <div class="form-group"><label>Nova senha</label><input type="password" id="pw1" placeholder="Digite a nova senha"/></div>
    <div class="form-group"><label>Confirmar senha</label><input type="password" id="pw2" placeholder="Repita a nova senha"/></div>
    <button class="btn" id="btn-reset">Redefinir senha</button>
    <div class="msg" id="msg"></div>
    <a href="/" class="back-link">Voltar ao login</a>
  </div>
  <div id="invalid-area" style="display:none">
    <div class="title">Link invalido</div>
    <div class="subtitle">Este link de redefinicao e invalido ou ja expirou.</div>
    <a href="/" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:20px">Solicitar novo link</a>
  </div>
</div>
<script>
var API = "https://powerbi-backend-production.up.railway.app";
var token = new URLSearchParams(window.location.search).get("token");
if (!token) {
  document.getElementById("form-area").style.display = "none";
  document.getElementById("invalid-area").style.display = "block";
}
document.getElementById("pw2").addEventListener("keydown", function(e){ if(e.key==="Enter") doReset(); });
document.getElementById("btn-reset").addEventListener("click", doReset);
function doReset(){
  var pw1 = document.getElementById("pw1").value;
  var pw2 = document.getElementById("pw2").value;
  var msg = document.getElementById("msg");
  msg.className = "msg"; msg.textContent = "";
  if(!pw1 || pw1.length < 6){ msg.className="msg error"; msg.textContent="A senha deve ter pelo menos 6 caracteres."; return; }
  if(pw1 !== pw2){ msg.className="msg error"; msg.textContent="As senhas nao coincidem."; return; }
  var btn = document.getElementById("btn-reset"); btn.disabled = true; btn.textContent = "Salvando...";
  fetch(API+"/auth/reset-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:token,password:pw1})})
  .then(function(r){return r.json().then(function(d){return{s:r.status,d:d};});})
  .then(function(res){
    btn.disabled = false; btn.textContent = "Redefinir senha";
    if(res.s !== 200){
      msg.className="msg error"; msg.textContent=res.d.error||"Erro ao redefinir.";
      if(res.d.error && res.d.error.includes("invalido")){
        document.getElementById("form-area").style.display="none";
        document.getElementById("invalid-area").style.display="block";
      }
      return;
    }
    msg.className="msg success"; msg.textContent=res.d.message||"Senha redefinida com sucesso!";
    btn.style.display="none";
    setTimeout(function(){ window.location.href="/"; }, 2500);
  })
  .catch(function(){ btn.disabled=false; btn.textContent="Redefinir senha"; msg.className="msg error"; msg.textContent="Erro de conexao."; });
}
</script>
</body>
</html>
